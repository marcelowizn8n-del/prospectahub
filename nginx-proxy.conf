server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy para Brave Search API (evita CORS)
    location /api/brave/ {
        proxy_pass https://api.search.brave.com/;
        proxy_set_header Host api.search.brave.com;
        proxy_set_header Accept "application/json";
        proxy_set_header Accept-Encoding "gzip";
        proxy_ssl_server_name on;

        # CORS headers
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, OPTIONS";
        add_header Access-Control-Allow-Headers "X-Subscription-Token, Content-Type, Accept, Accept-Encoding";

        # Handle preflight
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods "GET, OPTIONS";
            add_header Access-Control-Allow-Headers "X-Subscription-Token, Content-Type, Accept, Accept-Encoding";
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }
    }
}
